_format_version: "1.1"

services:
  # ── Supabase Auth (GoTrue) ───────────────────────────────────
  - name: auth-v1
    url: http://supabase-auth:9999/
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
            - apikey
            - X-Client-Info
          exposed_headers:
            - X-Kong-Upstream-Latency
            - X-Kong-Proxy-Latency
          credentials: true
          max_age: 3600

  # ── Supabase REST (PostgREST) ────────────────────────────────
  - name: rest-v1
    url: http://supabase-rest:3000/
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
            - apikey
            - X-Client-Info
            - Prefer
            - Range
          exposed_headers:
            - Content-Range
            - X-Kong-Upstream-Latency
          credentials: true
          max_age: 3600
