services:
  # ── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: ecbt_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ecbt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecbtpassword}
    volumes:
      - ecbt_db_data:/var/lib/postgresql/data
      - ./supabase/schema-pg.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./supabase/seed-pg.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecbt"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecbt_network

  # ── Next.js App ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecbt_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-ecbtpassword}@db:5432/ecbt
      JWT_SECRET: ${JWT_SECRET:-changeme-jwt-secret-min-32-chars!!}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      NODE_ENV: ${NODE_ENV:-production}
    volumes:
      - ecbt_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ecbt_network

volumes:
  ecbt_db_data:
    driver: local
  ecbt_uploads:
    driver: local

networks:
  ecbt_network:
    driver: bridge
